{% extends "layout.html"%} {%block container%}  {% import "_macros.html" as macros %} 


 <a href="insertarMaestros" class="font-medium text-fg-brand hover:underline">Insertar</a> 

<div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">
    <table class="w-full text-sm text-left rtl:text-right text-body">
        <thead class="bg-neutral-secondary-soft border-b border-default">
            <tr>
                <th scope="col" class="px-6 py-3 font-medium">
                    Nombre
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Apellidos
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Correo
                </th>
                 <th scope="col" class="px-6 py-3 font-medium">
                    Especialidad
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Editar
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Detalles
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Eliminar
                </th>
            </tr>
        </thead>
        <tbody>
          {% for mae in maestro %}
            <tr class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-default">
                <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap">
                    {{mae.nombre}}
                </th>
                <td class="px-6 py-4">
                    {{mae.apellidos}}
                </td>
                <td class="px-6 py-4">
                    {{mae.email}}
                </td>
                <td class="px-6 py-4">
                    {{mae.especialidad}}
                </td>
                <td class="px-6 py-4">
                    <a href="modificarMaestros?matricula={{mae.matricula}}" class="font-medium text-fg-brand hover:underline">Edit</a>
                </td>
                <td class="px-6 py-4">
                    <a href="detallesMaestros?matricula={{mae.matricula}}" class="font-medium text-fg-brand hover:underline">Detalles</a>
                </td>
                <td class="px-6 py-4">
                    <a href="eliminarMaestros?matricula={{mae.matricula}}" class="font-medium text-fg-brand hover:underline">Eliminar</a>
                </td>
            </tr>
          {% endfor %}  
        </tbody>
    </table>
</div>


{%endblock%}
